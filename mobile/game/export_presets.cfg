; Crownless — MOBILE export presets (Android + iOS).
;
; These live ONLY in the mobile snapshot (mobile/game/), never in the desktop
; project. Builds land in mobile/builds/ (git-ignored). This is SCAFFOLDING:
; producing an actual signed artifact still needs a toolchain not on the dev
; box — see mobile/README.md "Producing device builds" for the exact steps:
;   Android .aab (Play Store): flip gradle_build/use_gradle_build=true and
;     export_format=1, install the Godot Android build template + Android SDK +
;     JDK 17, and configure a keystore (Editor > Export).
;   iOS .ipa: this preset emits an Xcode project; sign/archive it on a Mac with
;     an Apple Developer account.

[preset.0]

name="Android"
platform="Android"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter="assets/asset_manifest.json,addons/CREDITS.txt,addons/netfox.noray/LICENSE,addons/netfox.internals/LICENSE"
exclude_filter="tests/*,shot_*.tscn,shot_*.gd,autotest.gd,check_compile.gd,econ_audit.gd"
export_path="../builds/Crownless.apk"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=0

